<!DOCTYPE html>
<html>
<head>
  <title>Comidas Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    .inicio {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(45deg, #ff9800, #ff5722);
    }

    .inicio h1 {
      font-size: 30px;
    }

    .inicio button {
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
    }

    .app {
      display: none;
      padding: 10px;
    }

    .card {
      background: #222;
      margin: 10px 0;
      padding: 15px;
      border-radius: 10px;
    }

    button {
      background: #ff9800;
      border: none;
      padding: 10px;
      margin: 3px;
      border-radius: 8px;
    }

    input {
      padding: 8px;
      margin: 3px;
      border-radius: 5px;
      border: none;
    }

    .carrito {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #000;
      padding: 10px;
    }
  </style>
</head>
<body>

<!-- PANTALLA INICIO -->
<div class="inicio" id="inicio">
  <h1>🍔 Bienvenido</h1>
  <p>Comidas Rápidas</p>
  <button onclick="entrar()">Entrar</button>
</div>

<!-- APP -->
<div class="app" id="app">

<h2>Menú</h2>
<div id="productos"></div>

<h3>Agregar / Editar</h3>
<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input id="desc" placeholder="Descripción">
<button onclick="agregar()">Guardar</button>

<div class="carrito">
  <p id="total">Total: $0</p>
  <button onclick="whatsapp()">Pedir por WhatsApp</button>
</div>

</div>

<script>
let productos = JSON.parse(localStorage.getItem("productos")) || [];
let carrito = [];
let editando = null;

function entrar(){
  document.getElementById("inicio").style.display="none";
  document.getElementById("app").style.display="block";
  mostrar();
}

function mostrar(){
  let html="";
  productos.forEach((p,i)=>{
    html+=`
    <div class="card">
      <h3>${p.nombre}</h3>
      <p>${p.desc}</p>
      <b>$${p.precio}</b><br>
      <button onclick="add(${i})">Agregar</button>
      <button onclick="editar(${i})">Editar</button>
      <button onclick="eliminar(${i})">Eliminar</button>
    </div>`;
  });
  document.getElementById("productos").innerHTML=html;
}

function agregar(){
  let p={
    nombre:nombre.value,
    precio:Number(precio.value),
    desc:desc.value
  };

  if(editando!==null){
    productos[editando]=p;
    editando=null;
  } else {
    productos.push(p);
  }

  localStorage.setItem("productos",JSON.stringify(productos));
  mostrar();

  nombre.value="";
  precio.value="";
  desc.value="";
}

function editar(i){
  let p=productos[i];
  nombre.value=p.nombre;
  precio.value=p.precio;
  desc.value=p.desc;
  editando=i;
}

function eliminar(i){
  productos.splice(i,1);
  localStorage.setItem("productos",JSON.stringify(productos));
  mostrar();
}

function add(i){
  carrito.push(productos[i]);
  actualizar();
}

function actualizar(){
  let total=0;
  carrito.forEach(p=> total+=p.precio);
  document.getElementById("total").innerText="Total: $"+total;
}

function whatsapp(){
  let msg=carrito.map(p=>p.nombre+" $"+p.precio).join("%0A");
  window.open("https://wa.me/573232226289?text=Pedido:%0A"+msg);
}
</script>

</body>
  </html>
