<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comidas</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

header {
  background:#d32f2f;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.card {
  background:#222;
  margin:10px;
  padding:15px;
  border-radius:10px;
}

button {
  background:#ff9800;
  border:none;
  padding:10px;
  border-radius:8px;
  width:100%;
}

.admin {
  display:none;
  padding:10px;
  background:#000;
}

input {
  padding:8px;
  margin:5px;
}
</style>
</head>

<body>

<header onclick="activarAdmin()">🍔 Comidas Rápidas</header>

<div id="productos"></div>

<div class="admin" id="admin">
  <h3>Modo Admin</h3>
  <input id="nombre" placeholder="Nombre">
  <input id="precio" placeholder="Precio">
  <input id="desc" placeholder="Descripción">
  <button onclick="guardar()">Guardar producto</button>
</div>

<script>
let productos = JSON.parse(localStorage.getItem("productos")) || [
  {nombre:"Hamburguesa", precio:15000, desc:"Carne y queso"},
  {nombre:"Salchipapas", precio:12000, desc:"Papas y salchicha"}
];

let adminActivo = false;

function activarAdmin(){
  let clave = prompt("Clave admin:");
  if(clave === "1234"){
    adminActivo = true;
    document.getElementById("admin").style.display="block";
    mostrar();
  }
}

function mostrar(){
  let html="";
  productos.forEach((p,i)=>{
    html+=`
    <div class="card">
      <h3>${p.nombre}</h3>
      <p>${p.desc}</p>
      <b>$${p.precio}</b><br><br>
      <button onclick="pedir('${p.nombre}')">Pedir</button>
      ${adminActivo ? `<button onclick="eliminar(${i})">Eliminar</button>` : ``}
    </div>`;
  });
  document.getElementById("productos").innerHTML=html;
}

function guardar(){
  let p={
    nombre:nombre.value,
    precio:precio.value,
    desc:desc.value
  };
  productos.push(p);
  localStorage.setItem("productos",JSON.stringify(productos));
  mostrar();
}

function eliminar(i){
  productos.splice(i,1);
  localStorage.setItem("productos",JSON.stringify(productos));
  mostrar();
}

function pedir(nombre){
  window.open("https://wa.me/573232226289?text=Quiero pedir: "+nombre);
}

mostrar();
</script>

</body>
</html>
