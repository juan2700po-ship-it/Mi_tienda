<!DOCTYPE html>
<html>
<head>
  <title>Comidas Rápidas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }
    header {
      background: #d32f2f;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }
    .container {
      padding: 10px;
    }
    .card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .card h3 {
      margin: 0;
    }
    .precio {
      color: #d32f2f;
      font-weight: bold;
      margin: 5px 0;
    }
    button {
      background: #ff9800;
      border: none;
      padding: 10px;
      border-radius: 8px;
      width: 100%;
      font-weight: bold;
    }
    .carrito {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      padding: 10px;
      box-shadow: 0 -2px 5px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<header>🍔 Comidas Rápidas</header>

<div class="container" id="productos"></div>

<div class="carrito">
  <div id="total">Total: $0</div>
  <button onclick="whatsapp()">Pedir por WhatsApp</button>
</div>

<script>
let productos = [
  {nombre:"Hamburguesa", precio:15000, desc:"Carne, queso, lechuga"},
  {nombre:"Salchipapas", precio:12000, desc:"Papas + salchicha"},
  {nombre:"Perro caliente", precio:10000, desc:"Pan, salchicha, salsas"}
];

let carrito = [];

function mostrar() {
  let html = "";
  productos.forEach((p,i)=>{
    html += `
    <div class="card">
      <h3>${p.nombre}</h3>
      <div class="precio">$${p.precio}</div>
      <p>${p.desc}</p>
      <button onclick="add(${i})">Agregar al carrito</button>
    </div>`;
  });
  document.getElementById("productos").innerHTML = html;
}

function add(i){
  carrito.push(productos[i]);
  actualizar();
}

function actualizar(){
  let total = 0;
  carrito.forEach(p=> total += p.precio);
  document.getElementById("total").innerText = "Total: $" + total;
}

function whatsapp(){
  let msg = carrito.map(p=> p.nombre+" $"+p.precio).join("%0A");
  window.open("https://wa.me/573232226289?text=Pedido:%0A"+msg);
}

mostrar();
</script>

</body>
</html>
